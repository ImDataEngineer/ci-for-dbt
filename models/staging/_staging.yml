version: 2

models:
  - name: stg_customers
    description: "Clients typés, une ligne par customer_id."
    columns:
      - name: customer_id
        description: "Clé primaire, correspond à raw_customers.customer_id."
        data_tests:
          - not_null
          - unique
      - name: email
        description: "Email de contact, mis en minuscule et trim."
      - name: name
      - name: country
      - name: plan
      - name: signed_up_at
        description: "Date d'inscription du client. Cast en DATE."

  - name: stg_orders
    description: "Commandes typées avec un montant dérivé en EUR."
    columns:
      - name: order_id
        description: "Clé primaire, unique sur toutes les commandes."
      - name: customer_id
        description: "Clé étrangère vers stg_customers.customer_id."
      - name: order_date
      - name: amount_cents
      - name: amount_eur
      - name: status
